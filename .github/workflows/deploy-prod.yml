name: Deploy Prod

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render Prod Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_PROD_DEPLOY_HOOK }}" \
            --fail \
            --silent \
            --show-error
