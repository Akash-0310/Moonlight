name: Deploy Dev

on:
  push:
    branches: [dev]

jobs:
  deploy:
    name: Deploy to Dev
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render Dev Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEV_DEPLOY_HOOK }}" \
            --fail \
            --silent \
            --show-error
