version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: moonlight_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-moonlight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moonlight_secret}
      POSTGRES_DB: ${POSTGRES_DB:-moonlight}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-moonlight}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: moonlight_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: moonlight_api
    restart: unless-stopped
    ports:
      - '4000:4000'
    env_file:
      - ./apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-moonlight}:${POSTGRES_PASSWORD:-moonlight_secret}@postgres:5432/${POSTGRES_DB:-moonlight}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379

volumes:
  postgres_data:
  redis_data:
