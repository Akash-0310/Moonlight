packages:
  - 'apps/*'
  - 'packages/*'
allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  '@sentry-internal/node-cpu-profiler': set this to true or false
  bcrypt: true
  msgpackr-extract: set this to true or false
  prisma: true
  sharp: true
  unrs-resolver: true
